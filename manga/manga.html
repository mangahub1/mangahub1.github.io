<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BluPetal Manga</title>
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon.png" />
  <link rel="stylesheet" href="./manga.css" />
</head>
<body>
  <header class="manga-topbar">
    <div class="topbar-left">
      <a href="../library.html" class="brand-link" aria-label="Back to library">
        <img src="../assets/logo-header.png" alt="BluPetal" />
      </a>
      <nav class="topbar-nav" aria-label="Primary">
        <a href="../library.html">Manga</a>
        <a href="#">News</a>
        <a href="#">Shop</a>
      </nav>
    </div>
    <div class="topbar-right">
      <details class="settings-menu">
        <summary class="library-icon-btn settings-trigger" aria-label="Account settings">
          <img
            id="accountAvatar"
            class="account-avatar hidden"
            src=""
            alt="Account avatar"
            referrerpolicy="no-referrer"
            decoding="async"
          />
          <svg class="library-icon-svg" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="8.1" r="3.1"></circle>
            <path d="M5.4 19.2a6.6 6.6 0 0 1 13.2 0"></path>
          </svg>
        </summary>
        <nav class="settings-dropdown" aria-label="Account menu">
          <div id="welcomeMessage" class="settings-welcome hidden"></div>
          <a href="#" class="settings-item">
            <svg class="settings-item-icon" viewBox="0 0 16 16" aria-hidden="true">
              <path d="M10.561 8.073a6.005 6.005 0 0 1 3.432 5.142.75.75 0 1 1-1.498.07 4.5 4.5 0 0 0-8.99 0 .75.75 0 0 1-1.498-.07 6.004 6.004 0 0 1 3.431-5.142 3.999 3.999 0 1 1 5.123 0ZM10.5 5a2.5 2.5 0 1 0-5 0 2.5 2.5 0 0 0 5 0Z"></path>
            </svg>
            <span>Profile</span>
          </a>
          <a href="#" class="settings-item">
            <svg class="settings-item-icon" viewBox="0 0 16 16" aria-hidden="true">
              <path d="M8 0a8.2 8.2 0 0 1 .701.031C9.444.095 9.99.645 10.16 1.29l.288 1.107c.018.066.079.158.212.224.231.114.454.243.668.386.123.082.233.09.299.071l1.103-.303c.644-.176 1.392.021 1.82.63.27.385.506.792.704 1.218.315.675.111 1.422-.364 1.891l-.814.806c-.049.048-.098.147-.088.294.016.257.016.515 0 .772-.01.147.038.246.088.294l.814.806c.475.469.679 1.216.364 1.891a7.977 7.977 0 0 1-.704 1.217c-.428.61-1.176.807-1.82.63l-1.102-.302c-.067-.019-.177-.011-.3.071a5.909 5.909 0 0 1-.668.386c-.133.066-.194.158-.211.224l-.29 1.106c-.168.646-.715 1.196-1.458 1.26a8.006 8.006 0 0 1-1.402 0c-.743-.064-1.289-.614-1.458-1.26l-.289-1.106c-.018-.066-.079-.158-.212-.224a5.738 5.738 0 0 1-.668-.386c-.123-.082-.233-.09-.299-.071l-1.103.303c-.644.176-1.392-.021-1.82-.63a8.12 8.12 0 0 1-.704-1.218c-.315-.675-.111-1.422.363-1.891l.815-.806c.05-.048.098-.147.088-.294a6.214 6.214 0 0 1 0-.772c.01-.147-.038-.246-.088-.294l-.815-.806C.635 6.045.431 5.298.746 4.623a7.92 7.92 0 0 1 .704-1.217c.428-.61 1.176-.807 1.82-.63l1.102.302c.067.019.177.011.3-.071.214-.143.437-.272.668-.386.133-.066.194-.158.211-.224l.29-1.106C6.009.645 6.556.095 7.299.03 7.53.01 7.764 0 8 0Zm-.571 1.525c-.036.003-.108.036-.137.146l-.289 1.105c-.147.561-.549.967-.998 1.189-.173.086-.34.183-.5.29-.417.278-.97.423-1.529.27l-1.103-.303c-.109-.03-.175.016-.195.045-.22.312-.412.644-.573.99-.014.031-.021.11.059.19l.815.806c.411.406.562.957.53 1.456a4.709 4.709 0 0 0 0 .582c.032.499-.119 1.05-.53 1.456l-.815.806c-.081.08-.073.159-.059.19.162.346.353.677.573.989.02.03.085.076.195.046l1.102-.303c.56-.153 1.113-.008 1.53.27.161.107.328.204.501.29.447.222.85.629.997 1.189l.289 1.105c.029.109.101.143.137.146a6.6 6.6 0 0 0 1.142 0c.036-.003.108-.036.137-.146l.289-1.105c.147-.561.549-.967.998-1.189.173-.086.34-.183.5-.29.417-.278.97-.423 1.529-.27l1.103.303c.109.029.175-.016.195-.045.22-.313.411-.644.573-.99.014-.031.021-.11-.059-.19l-.815-.806c-.411-.406-.562-.957-.53-1.456a4.709 4.709 0 0 0 0-.582c-.032-.499.119-1.05.53-1.456l.815-.806c.081-.08.073-.159.059-.19a6.464 6.464 0 0 0-.573-.989c-.02-.03-.085-.076-.195-.046l-1.102.303c-.56.153-1.113.008-1.53-.27a4.44 4.44 0 0 0-.501-.29c-.447-.222-.85-.629-.997-1.189l-.289-1.105c-.029-.11-.101-.143-.137-.146a6.6 6.6 0 0 0-1.142 0Z"></path>
            </svg>
            <span>Settings</span>
          </a>
          <div id="adminPortalGroup" class="settings-group hidden" aria-label="Admin portal">
            <div class="settings-group-label">Admin Portal</div>
            <a href="../users/admin-users.html" class="settings-item settings-subitem"><span>User Accounts</span></a>
            <a href="../content/admin-content.html" class="settings-item settings-subitem"><span>Content</span></a>
          </div>
          <a href="../index.html" class="settings-item signout">
            <svg class="settings-item-icon" viewBox="0 0 16 16" aria-hidden="true">
              <path d="M2 2.75C2 1.784 2.784 1 3.75 1h2.5a.75.75 0 0 1 0 1.5h-2.5a.25.25 0 0 0-.25.25v10.5c0 .138.112.25.25.25h2.5a.75.75 0 0 1 0 1.5h-2.5A1.75 1.75 0 0 1 2 13.25Zm10.44 4.5-1.97-1.97a.749.749 0 0 1 .326-1.275.749.749 0 0 1 .734.215l3.25 3.25a.75.75 0 0 1 0 1.06l-3.25 3.25a.749.749 0 0 1-1.275-.326.749.749 0 0 1 .215-.734l1.97-1.97H6.75a.75.75 0 0 1 0-1.5Z"></path>
            </svg>
            <span>Sign out</span>
          </a>
        </nav>
      </details>
    </div>
  </header>

  <main id="mangaPage" class="manga-page" aria-live="polite">
    <section id="mangaError" class="manga-error hidden" role="alert"></section>

    <section id="mangaLayout" class="manga-layout hidden">
      <aside class="manga-left">
        <img id="mangaCover" class="manga-cover" src="" alt="" />
        <div class="manga-actions">
          <a class="back-library-btn" href="../library.html">Back to Library</a>
          <a id="startReadingBtn" class="start-reading-btn" href="../library.html">Start Reading</a>
        </div>

        <section class="meta-card">
          <div class="meta-row">
            <h3>Author</h3>
            <p id="metaAuthor">Unknown</p>
          </div>
          <div class="meta-row">
            <h3>Genre</h3>
            <div id="metaGenres" class="genre-chips"></div>
          </div>
          <div class="meta-row">
            <h3>Age Rating</h3>
            <p id="metaAge">18+</p>
          </div>
          <div class="meta-row">
            <h3>Status</h3>
            <p id="metaStatus">Ongoing</p>
          </div>
          <div class="meta-row">
            <h3>Rating</h3>
            <p id="metaRating">4.8</p>
          </div>
        </section>
      </aside>

      <section class="manga-right">
        <h1 id="mangaTitle" class="manga-title">Manga Title</h1>
        <div id="mangaDescription" class="manga-description"></div>

        <div class="volume-head">
          <h2>Volumes</h2>
        </div>
        <div id="volumeList" class="volume-list"></div>
      </section>
    </section>
  </main>

  <script type="module" src="../auth/auth-guard.js"></script>
  <script type="module" src="./manga.js"></script>
</body>
</html>
